<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ferrograph metaball demo</title>
  <style>
    body { margin: 0; overflow: hidden; background: #FFFFFF; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #controls {
      position: fixed; top: 16px; right: 16px;
      background: rgba(0,0,0,0.82); color: #ddd;
      padding: 14px 18px; border-radius: 10px;
      font: 12px/1.6 system-ui, sans-serif;
      min-width: 210px; z-index: 10;
      backdrop-filter: blur(8px);
    }
    #controls h3 { margin: 0 0 8px; font-size: 13px; color: #fff; }
    #controls label { display: flex; justify-content: space-between; align-items: center; margin: 4px 0; }
    #controls label span { flex: 1; }
    #controls label .val { width: 36px; text-align: right; font-variant-numeric: tabular-nums; color: #aaa; }
    #controls input[type=range] { width: 90px; margin: 0 6px; accent-color: #888; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="controls">
    <h3>Lighting</h3>
    <label><span>Light X</span><input type="range" id="sLightX" min="-1" max="1" step="0.05" value="-0.30"><span class="val" id="vLightX">-0.30</span></label>
    <label><span>Light Y</span><input type="range" id="sLightY" min="-1" max="1" step="0.05" value="0.75"><span class="val" id="vLightY">0.75</span></label>
    <label><span>Light Z</span><input type="range" id="sLightZ" min="0.05" max="1" step="0.05" value="0.40"><span class="val" id="vLightZ">0.40</span></label>
    <label><span>Diffuse</span><input type="range" id="sDiff" min="0" max="1" step="0.05" value="0.05"><span class="val" id="vDiff">0.05</span></label>
    <label><span>Spec power</span><input type="range" id="sSpecPow" min="10" max="500" step="5" value="115"><span class="val" id="vSpecPow">115</span></label>
    <label><span>Spec intensity</span><input type="range" id="sSpecStr" min="0" max="3" step="0.1" value="0.80"><span class="val" id="vSpecStr">0.80</span></label>
    <label><span>Normal scale</span><input type="range" id="sNorm" min="0.05" max="2" step="0.05" value="0.10"><span class="val" id="vNorm">0.10</span></label>
    <h3>Shape</h3>
    <label><span>Separation</span><input type="range" id="sSep" min="5" max="20" step="1" value="7"><span class="val" id="vSep">7</span></label>
    <label><span>Big min</span><input type="range" id="sBigMin" min="0.5" max="5" step="0.25" value="2.75"><span class="val" id="vBigMin">2.75</span></label>
    <label><span>Big max</span><input type="range" id="sBigMax" min="0.5" max="6" step="0.25" value="3.5"><span class="val" id="vBigMax">3.50</span></label>
    <label><span>Small min</span><input type="range" id="sSmallMin" min="0.25" max="4" step="0.25" value="2.0"><span class="val" id="vSmallMin">2.00</span></label>
    <label><span>Small max</span><input type="range" id="sSmallMax" min="0.25" max="5" step="0.25" value="2.5"><span class="val" id="vSmallMax">2.50</span></label>
  </div>
  <script>
    const VS = `#version 300 es
    in vec2 a_pos;
    void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }`;

    const FS = `#version 300 es
    precision highp float;
    out vec4 o;
    uniform float u_t;
    uniform vec2 u_res;
    uniform float u_n[63]; // 9 nodes × 7 floats

    float fieldAt(vec2 p, vec2 pos[9], float rad[9]) {
      float f = 0.0;
      for (int i = 0; i < 9; i++) {
        vec2 v = p - pos[i];
        f += (rad[i] * rad[i]) / dot(v, v);
      }
      return f;
    }

    vec2 nodePos(int i, float t) {
      int j = i * 7;
      return vec2(
        u_n[j]   + sin(t * 0.6 + u_n[j+3])       * u_n[j+4]
                 + sin(t * 0.23 + u_n[j+3] * 2.1) * u_n[j+4] * 0.3,
        u_n[j+1] + cos(t * 0.4 + u_n[j+3] * 1.3) * u_n[j+4]
                 + cos(t * 0.17 + u_n[j+3] * 0.7) * u_n[j+4] * 0.3
      );
    }

    // tapered strand: thick at endpoints (capped to blob radius), thin in middle
    // cubic falloff from each end creates a concave liquid-bridge profile
    float strandMask(vec2 p, vec2 a, vec2 b, float ra, float rb) {
      vec2 ab = b - a;
      float param = clamp(dot(p - a, ab) / dot(ab, ab), 0.0, 1.0);
      float dist = length(p - a - ab * param);
      float endA = min(ra * 0.7, 1.5);
      float endB = min(rb * 0.7, 1.5);
      float tA = (1.0 - param) * (1.0 - param) * (1.0 - param);
      float tB = param * param * param;
      float width = max(0.06, endA * tA + endB * tB);
      return 1.0 - smoothstep(width - 0.04, width, dist);
    }

    void main() {
      float scale = 32.0 / min(u_res.x, u_res.y);
      vec2 p = (gl_FragCoord.xy - u_res * 0.5) * scale + 16.0;
      float t = u_t * 0.001;

      vec2 pos[9];
      float rad[9];
      float field = 0.0;
      for (int i = 0; i < 9; i++) {
        pos[i] = nodePos(i, t);
        int j = i * 7;
        float rmul = mix(1.0, max(0.0, 0.5 + 0.5 * sin(t * 0.25 + u_n[j+5])), u_n[j+6]);
        rad[i] = u_n[j+2] * rmul;
        vec2 v = p - pos[i];
        field += (rad[i] * rad[i]) / dot(v, v);
      }

      // graph edges: intra-cluster triangles + inter-cluster anchor links
      const int E[24] = int[24](
        0,1, 0,2, 1,2,
        3,4, 3,5, 4,5,
        6,7, 6,8, 7,8,
        0,3, 0,6, 3,6
      );
      float lineMask = 0.0;
      for (int e = 0; e < 12; e++) {
        int ea = E[e*2], eb = E[e*2+1];
        lineMask = max(lineMask, strandMask(p, pos[ea], pos[eb], rad[ea], rad[eb]));
      }

      float blobMask = step(1.0, field);
      o = vec4(field, blobMask, lineMask, 1.0);
    }`;

    const FS_BLUR = `#version 300 es
    precision highp float;
    out vec4 o;
    uniform vec2 u_res;
    uniform sampler2D u_pass1;

    void main() {
      vec2 uv = gl_FragCoord.xy / u_res;
      vec2 texel = 1.0 / u_res;
      const float radius = 24.0;
      const int radiusI = 8;
      float total = 0.0;
      float sum = 0.0;
      for (int iy = -radiusI; iy <= radiusI; iy++) {
        for (int ix = -radiusI; ix <= radiusI; ix++) {
          float dx = float(ix) * 3.0;
          float dy = float(iy) * 3.0;
          float d = length(vec2(dx, dy));
          if (d <= radius) {
            vec2 off = vec2(dx, dy) * texel;
            float blobMask = texture(u_pass1, uv + off).g;
            float lineMask = texture(u_pass1, uv + off).b;
            float ink = max(blobMask, lineMask);
            float w = 1.0 - smoothstep(0.0, radius, d);
            sum += ink * w;
            total += w;
          }
        }
      }
      float blurred = total > 0.0 ? sum / total : 0.0;
      blurred = pow(blurred, 0.6);
      float rawBlob = texture(u_pass1, uv).g;
      float rawLine = texture(u_pass1, uv).b;
      float rawInk = max(rawBlob, rawLine);
      o = vec4(blurred, rawInk, 0.0, 1.0);
    }`;

    const FS_FERRO = `#version 300 es
    precision highp float;
    out vec4 o;
    uniform vec2 u_res;
    uniform sampler2D u_heightmap;
    uniform float u_lightX;
    uniform float u_lightY;
    uniform float u_lightZ;
    uniform float u_diffStr;
    uniform float u_specPow;
    uniform float u_specStr;
    uniform float u_normScale;

    void main() {
      vec2 uv = gl_FragCoord.xy / u_res;
      vec2 texel = 1.0 / u_res;
      float e = 2.0;
      float hC = texture(u_heightmap, uv).r;
      float ink = texture(u_heightmap, uv).g;
      float hL = texture(u_heightmap, uv + vec2(-e, 0.0) * texel).r;
      float hR = texture(u_heightmap, uv + vec2( e, 0.0) * texel).r;
      float hD = texture(u_heightmap, uv + vec2(0.0, -e) * texel).r;
      float hU = texture(u_heightmap, uv + vec2(0.0,  e) * texel).r;
      vec3 N = normalize(vec3((hL - hR) * u_normScale, (hD - hU) * u_normScale, 0.015));
      vec3 V = vec3(0.0, 0.0, 1.0);
      vec3 L = normalize(vec3(u_lightX, u_lightY, u_lightZ));
      vec3 H = normalize(V + L);
      float NdotL = max(0.0, dot(N, L));
      float diff = NdotL * u_diffStr;
      float spec = pow(max(0.0, dot(N, H)), u_specPow) * u_specStr;
      vec3 baseColor = vec3(0.01, 0.01, 0.015);
      vec3 color = baseColor + vec3(0.22, 0.24, 0.28) * diff + vec3(1.0) * spec;
      if (ink < 0.5) {
        color = vec3(1.0);
      }
      o = vec4(color, 1.0);
    }`;

    function randomNodes(minSep, bigMin, bigMax, smallMin, smallMax) {
      const TAU = Math.PI * 2;
      let centers;
      for (let attempt = 0; attempt < 200; attempt++) {
        centers = [];
        let failed = false;
        for (let i = 0; i < 3; i++) {
          let cx, cy, ok, tries = 0;
          do {
            cx = 7 + Math.random() * 18;
            cy = 7 + Math.random() * 18;
            ok = centers.every(c => Math.hypot(cx - c.x, cy - c.y) >= minSep);
          } while (!ok && ++tries < 500);
          if (!ok) { failed = true; break; }
          centers.push({ x: cx, y: cy });
        }
        if (!failed) break;
      }

      const data = [];
      for (const c of centers) {
        data.push(
          c.x, c.y,
          bigMin + Math.random() * (bigMax - bigMin),
          Math.random() * TAU,
          0.8 + Math.random() * 0.8,
          Math.random() * TAU,
          0.1 + Math.random() * 0.1,
        );
        for (let s = 0; s < 2; s++) {
          const a = Math.random() * TAU;
          const dist = 2.5 + Math.random() * 2;
          data.push(
            c.x + Math.cos(a) * dist,
            c.y + Math.sin(a) * dist,
            smallMin + Math.random() * (smallMax - smallMin),
            Math.random() * TAU,
            1.5 + Math.random(),
            Math.random() * TAU,
            0.7 + Math.random() * 0.3,
          );
        }
      }
      return new Float32Array(data);
    }

    const canvas = document.getElementById('c');
    const gl = canvas.getContext('webgl2');
    const extFloat = gl.getExtension('EXT_color_buffer_float');
    if (!extFloat) {
      throw new Error('EXT_color_buffer_float not supported');
    }

    let w, h;

    function initTex(tex, tw, th) {
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA16F, tw, th, 0, gl.RGBA, gl.HALF_FLOAT, null);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    }

    const fboTex = gl.createTexture();
    const fbo = gl.createFramebuffer();
    const fboTexB = gl.createTexture();
    const fboB = gl.createFramebuffer();

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      w = Math.round(canvas.clientWidth * dpr);
      h = Math.round(canvas.clientHeight * dpr);
      canvas.width = w;
      canvas.height = h;
      initTex(fboTex, w, h);
      gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
      gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, fboTex, 0);
      initTex(fboTexB, w, h);
      gl.bindFramebuffer(gl.FRAMEBUFFER, fboB);
      gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, fboTexB, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    function compile(type, src) {
      const s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      return s;
    }

    const prog = gl.createProgram();
    gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
    gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
    gl.linkProgram(prog);

    const progBlur = gl.createProgram();
    gl.attachShader(progBlur, compile(gl.VERTEX_SHADER, VS));
    gl.attachShader(progBlur, compile(gl.FRAGMENT_SHADER, FS_BLUR));
    gl.linkProgram(progBlur);

    const progFerro = gl.createProgram();
    gl.attachShader(progFerro, compile(gl.VERTEX_SHADER, VS));
    gl.attachShader(progFerro, compile(gl.FRAGMENT_SHADER, FS_FERRO));
    gl.linkProgram(progFerro);

    const uT = gl.getUniformLocation(prog, 'u_t');
    const uRes = gl.getUniformLocation(prog, 'u_res');
    const uN = gl.getUniformLocation(prog, 'u_n');
    const uResBlur = gl.getUniformLocation(progBlur, 'u_res');
    const uPass1Blur = gl.getUniformLocation(progBlur, 'u_pass1');
    const uResFerro = gl.getUniformLocation(progFerro, 'u_res');
    const uHeightmap = gl.getUniformLocation(progFerro, 'u_heightmap');
    const uLightX = gl.getUniformLocation(progFerro, 'u_lightX');
    const uLightY = gl.getUniformLocation(progFerro, 'u_lightY');
    const uLightZ = gl.getUniformLocation(progFerro, 'u_lightZ');
    const uDiffStr = gl.getUniformLocation(progFerro, 'u_diffStr');
    const uSpecPow = gl.getUniformLocation(progFerro, 'u_specPow');
    const uSpecStr = gl.getUniformLocation(progFerro, 'u_specStr');
    const uNormScale = gl.getUniformLocation(progFerro, 'u_normScale');

    const sliders = {
      lightX: document.getElementById('sLightX'),
      lightY: document.getElementById('sLightY'),
      lightZ: document.getElementById('sLightZ'),
      diff:   document.getElementById('sDiff'),
      specPow:document.getElementById('sSpecPow'),
      specStr:document.getElementById('sSpecStr'),
      norm:   document.getElementById('sNorm'),
    };
    const valEls = {
      lightX: document.getElementById('vLightX'),
      lightY: document.getElementById('vLightY'),
      lightZ: document.getElementById('vLightZ'),
      diff:   document.getElementById('vDiff'),
      specPow:document.getElementById('vSpecPow'),
      specStr:document.getElementById('vSpecStr'),
      norm:   document.getElementById('vNorm'),
    };
    for (const [k, el] of Object.entries(sliders)) {
      el.addEventListener('input', () => {
        const v = parseFloat(el.value);
        valEls[k].textContent = Number.isInteger(v) ? String(v) : v.toFixed(2);
      });
    }

    const sepSlider = document.getElementById('sSep');
    const sepVal = document.getElementById('vSep');
    const shapeSliders = {
      bigMin:   document.getElementById('sBigMin'),
      bigMax:   document.getElementById('sBigMax'),
      smallMin: document.getElementById('sSmallMin'),
      smallMax: document.getElementById('sSmallMax'),
    };
    const shapeVals = {
      bigMin:   document.getElementById('vBigMin'),
      bigMax:   document.getElementById('vBigMax'),
      smallMin: document.getElementById('vSmallMin'),
      smallMax: document.getElementById('vSmallMax'),
    };

    function regenerate() {
      const data = randomNodes(
        parseFloat(sepSlider.value),
        parseFloat(shapeSliders.bigMin.value),
        parseFloat(shapeSliders.bigMax.value),
        parseFloat(shapeSliders.smallMin.value),
        parseFloat(shapeSliders.smallMax.value)
      );
      gl.useProgram(prog);
      gl.uniform1fv(uN, data);
    }
    sepSlider.addEventListener('input', () => { sepVal.textContent = sepSlider.value; regenerate(); });
    for (const [k, el] of Object.entries(shapeSliders)) {
      el.addEventListener('input', () => { shapeVals[k].textContent = parseFloat(el.value).toFixed(2); regenerate(); });
    }

    const nodeData = randomNodes(
      parseFloat(sepSlider.value),
      parseFloat(shapeSliders.bigMin.value),
      parseFloat(shapeSliders.bigMax.value),
      parseFloat(shapeSliders.smallMin.value),
      parseFloat(shapeSliders.smallMax.value)
    );
    gl.useProgram(prog);
    gl.uniform1fv(uN, nodeData);

    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
    const aPos = gl.getAttribLocation(prog, 'a_pos');
    const aPosBlur = gl.getAttribLocation(progBlur, 'a_pos');
    const aPosFerro = gl.getAttribLocation(progFerro, 'a_pos');
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

    function frame(t) {
      gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
      gl.viewport(0, 0, w, h);
      gl.useProgram(prog);
      gl.enableVertexAttribArray(aPos);
      gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);
      gl.uniform2f(uRes, w, h);
      gl.uniform1f(uT, t);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

      gl.bindFramebuffer(gl.FRAMEBUFFER, fboB);
      gl.viewport(0, 0, w, h);
      gl.useProgram(progBlur);
      gl.enableVertexAttribArray(aPosBlur);
      gl.vertexAttribPointer(aPosBlur, 2, gl.FLOAT, false, 0, 0);
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, fboTex);
      gl.uniform1i(uPass1Blur, 0);
      gl.uniform2f(uResBlur, w, h);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

      gl.bindFramebuffer(gl.FRAMEBUFFER, null);
      gl.viewport(0, 0, w, h);
      gl.useProgram(progFerro);
      gl.enableVertexAttribArray(aPosFerro);
      gl.vertexAttribPointer(aPosFerro, 2, gl.FLOAT, false, 0, 0);
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, fboTexB);
      gl.uniform1i(uHeightmap, 0);
      gl.uniform2f(uResFerro, w, h);
      gl.uniform1f(uLightX,    parseFloat(sliders.lightX.value));
      gl.uniform1f(uLightY,    parseFloat(sliders.lightY.value));
      gl.uniform1f(uLightZ,    parseFloat(sliders.lightZ.value));
      gl.uniform1f(uDiffStr,   parseFloat(sliders.diff.value));
      gl.uniform1f(uSpecPow,   parseFloat(sliders.specPow.value));
      gl.uniform1f(uSpecStr,   parseFloat(sliders.specStr.value));
      gl.uniform1f(uNormScale, parseFloat(sliders.norm.value));
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
