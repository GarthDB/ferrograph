<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 32" fill="none" aria-hidden="true">
  <title>Ferrograph wordmark</title>
  <g class="lockup">
    <!-- Logo mark (scaled to 32px height, 32px width) -->
    <g transform="translate(0, 0) scale(1)" class="mark">
      <circle cx="16" cy="16" r="3.5" class="hub" />
      <line x1="16" y1="16" x2="16" y2="4" class="edge" stroke-linecap="round" />
      <line x1="16" y1="16" x2="22.5" y2="7.2" class="edge" stroke-linecap="round" />
      <line x1="16" y1="16" x2="26" y2="16" class="edge" stroke-linecap="round" />
      <line x1="16" y1="16" x2="22.5" y2="24.8" class="edge" stroke-linecap="round" />
      <line x1="16" y1="16" x2="16" y2="28" class="edge" stroke-linecap="round" />
      <line x1="16" y1="16" x2="9.5" y2="24.8" class="edge" stroke-linecap="round" />
      <line x1="16" y1="16" x2="6" y2="16" class="edge" stroke-linecap="round" />
      <line x1="16" y1="16" x2="9.5" y2="7.2" class="edge" stroke-linecap="round" />
      <circle cx="16" cy="4" r="1.5" class="node" />
      <circle cx="22.5" cy="7.2" r="1.5" class="node accent" />
      <circle cx="26" cy="16" r="1.5" class="node" />
      <circle cx="22.5" cy="24.8" r="1.5" class="node" />
      <circle cx="16" cy="28" r="1.5" class="node accent" />
      <circle cx="9.5" cy="24.8" r="1.5" class="node" />
      <circle cx="6" cy="16" r="1.5" class="node" />
      <circle cx="9.5" cy="7.2" r="1.5" class="node" />
    </g>
    <!-- Wordmark: "ferrograph" -->
    <text x="44" y="22" class="wordmark" font-family="ui-sans-serif, system-ui, sans-serif, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="600" fill="var(--fg-steel, currentColor)">ferrograph</text>
  </g>
  <style>
    .mark .hub { fill: var(--fg-steel, currentColor); }
    .mark .edge { stroke: var(--fg-steel, currentColor); stroke-width: 1; }
    .mark .node { fill: var(--fg-steel, currentColor); }
    .mark .node.accent { fill: var(--fg-accent, currentColor); }
  </style>
</svg>
